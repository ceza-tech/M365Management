# config/entra/authentication-methods.yaml
# Desired state for Authentication Method policies.
#
# HOW TO USE:
#   Edit properties below, then run:  pwsh ./scripts/Apply-Config.ps1
#   or push to main — GitHub Actions will apply automatically.
#
# The resource type and property names must exactly match what the snapshot returns.
# Reference: https://learn.microsoft.com/en-us/graph/utcm-entra-resources#authenticationmethodpolicy-resource-type

resources:
  - resourceType: microsoft.entra.authenticationmethodpolicy
    properties:
      Id: "authenticationMethodsPolicy"
      DisplayName: "Authentication Methods Policy"
      IsSingleInstance: "Yes"
      Ensure: "Present"
      # Registration campaign nudges users to register Microsoft Authenticator.
      # Set State to 'enabled' to actively prompt, 'disabled' to leave it off.
      RegistrationEnforcement:
        AuthenticationMethodsRegistrationCampaign:
          State: enabled
          SnoozeDurationInDays: 1
          ExcludeTargets: []
          IncludeTargets:
            - TargetType: group
              Id: all_users
              TargetedAuthenticationMethod: microsoftAuthenticator
