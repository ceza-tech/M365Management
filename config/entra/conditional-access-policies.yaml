# config/entra/conditional-access-policies.yaml
# Desired state for Conditional Access Policies in Microsoft Entra.
#
# HOW TO USE:
#   Each entry needs the real GUID of the CA policy in your tenant.
#   Find GUIDs in the Entra portal → Protection → Conditional Access, or
#   run a snapshot: pwsh ./scripts/Take-Snapshot.ps1 -Resources @('microsoft.entra.conditionalaccesspolicy')
#
#   Then push to main — GitHub Actions will enforce the desired state.
#
# IMPORTANT: Property names must be PascalCase (as returned in the snapshot).
# Reference: https://learn.microsoft.com/en-us/graph/utcm-entra-resources#conditionalaccesspolicy-resource-type

resources:
  - resourceType: microsoft.entra.conditionalaccesspolicy
    # Replace with the real GUID from your tenant (from Entra portal or snapshot)
    id: "00000000-0000-0000-0000-000000000001"
    properties:
      DisplayName: "Require MFA for All Users"
      State: enabled
      Conditions:
        Users:
          IncludeUsers:
            - All
          ExcludeUsers: []
          ExcludeGroups: []
        Applications:
          IncludeApplications:
            - All
        ClientAppTypes:
          - browser
          - mobileAppsAndDesktopClients
      GrantControls:
        Operator: OR
        BuiltInControls:
          - mfa

  - resourceType: microsoft.entra.conditionalaccesspolicy
    # Replace with the real GUID from your tenant
    id: "00000000-0000-0000-0000-000000000002"
    properties:
      DisplayName: "Block Legacy Authentication"
      State: enabled
      Conditions:
        Users:
          IncludeUsers:
            - All
        Applications:
          IncludeApplications:
            - All
        ClientAppTypes:
          - exchangeActiveSync
          - other
      GrantControls:
        Operator: OR
        BuiltInControls:
          - block
