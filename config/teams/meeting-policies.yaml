# config/teams/meeting-policies.yaml
# Desired state for Teams Meeting Policies.
#
# HOW TO USE:
#   Push to main — GitHub Actions applies automatically.
#   Or run locally: pwsh ./scripts/Apply-Config.ps1
#
# Resource type uses the microsoft.teams.* dotted namespace.
# Reference: https://learn.microsoft.com/en-us/graph/utcm-teams-resources#meetingpolicy-resource-type

resources:
  - resourceType: microsoft.teams.meetingpolicy
    # 'Global' is the org-wide default policy applied to all users without an explicit assignment
    id: Global
    properties:
      AllowAnonymousUsersToJoinMeeting: false
      AllowAnonymousUsersToStartMeeting: false
      AllowExternalParticipantGiveRequestControl: false
      AllowForeignParticipantsToUseCameraInMeeting: true
      AllowMeetingRegistration: true
      AllowNetworkConfigurationSettingsLookup: false
      AllowOrganizersToOverrideLobbySettings: false
      AllowOutlookAddIn: true
      AllowParticipantGiveRequestControl: true
      AllowPrivateMeetingScheduling: true
      AllowRecordingStorageOutsideRegion: false
      AllowTranscription: true
      AutoAdmittedUsers: EveryoneInCompanyExcludingGuests
      LobbyBypassScope: Organization
      RecordingStorageMode: OneDriveForBusiness
      VideoFiltersMode: All
