name: Take Configuration Snapshot

on:
  # Weekly snapshot for baseline auditing
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 2am UTC
  workflow_dispatch:
    inputs:
      resources:
        description: 'Comma-separated UTCM resource types to snapshot'
        required: false
        default: 'microsoft.entra.conditionalaccesspolicy,microsoft.entra.authenticationmethodpolicy,microsoft.entra.authorizationpolicy,microsoft.entra.securitydefaults'
      display_name:
        description: 'Display name for this snapshot job (8-32 chars, letters/numbers/spaces only)'
        required: false
        default: 'Scheduled Snapshot'
      commit_to_repo:
        description: 'Commit snapshot output to the repository'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # Needed to commit snapshot files

jobs:
  snapshot:
    name: Capture Tenant Configuration Snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Take snapshot
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $resources = '${{ github.event.inputs.resources }}' -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          if (-not $resources) {
            $resources = @(
              'microsoft.entra.conditionalaccesspolicy',
              'microsoft.entra.authenticationmethodpolicy',
              'microsoft.entra.authorizationpolicy',
              'microsoft.entra.securitydefaults'
            )
          }
          $displayName = '${{ github.event.inputs.display_name }}'
          if (-not $displayName) { $displayName = 'Scheduled Snapshot' }
          ./scripts/Take-Snapshot.ps1 -Resources $resources -DisplayName $displayName

      - name: Upload snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: m365-snapshot-${{ github.run_number }}
          path: snapshots/output/
          retention-days: 30

      - name: Write snapshot summary
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path snapshots/output -Filter '*.json' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($files) {
            echo "## 📸 Snapshot Complete" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "Snapshot saved as workflow artifact: **$($files.Name)**" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "To use as a new desired-state baseline:" >> $env:GITHUB_STEP_SUMMARY
            echo "1. Download the artifact" >> $env:GITHUB_STEP_SUMMARY
            echo "2. Extract the relevant resources to \`config/<workload>/*.yaml\`" >> $env:GITHUB_STEP_SUMMARY
            echo "3. Commit and push — the Apply workflow will enforce it going forward" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Commit snapshot to repo (optional)
        if: github.event.inputs.commit_to_repo == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/output/
          git diff --staged --quiet || git commit -m "chore: automated tenant snapshot [skip ci]"
          git push
