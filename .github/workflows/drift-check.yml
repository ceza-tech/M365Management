name: Drift Detection

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (aligned with UTCM monitor frequency)
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant to check (folder name under tenants/). Leave blank to check all.'
        required: false
        default: ''
      fail_on_drift:
        description: 'Fail pipeline if drifts are detected'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write   # To create/update drift alert issues

jobs:
  discover-tenants:
    name: Discover Tenants
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.list.outputs.tenants }}
    steps:
      - uses: actions/checkout@v4
      - name: List tenants
        id: list
        shell: pwsh
        run: |
          $requested = '${{ github.event.inputs.tenant }}'
          $tenants   = if ($requested) { @($requested) } else {
            Get-ChildItem tenants -Directory | Select-Object -ExpandProperty Name
          }
          $json = $tenants | ConvertTo-Json -Compress
          if ($tenants.Count -eq 1) { $json = "[$json]" }
          echo "tenants=$json" >> $env:GITHUB_OUTPUT

  drift-check:
    name: Drift Check — ${{ matrix.tenant }}
    needs: discover-tenants
    runs-on: ubuntu-latest
    environment: ${{ matrix.tenant }}
    strategy:
      matrix:
        tenant: ${{ fromJson(needs.discover-tenants.outputs.tenants) }}
      fail-fast: false
    outputs:
      drift_count: ${{ steps.check.outputs.drift_count }}

    steps:
      - uses: actions/checkout@v4

      - name: Install required PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name powershell-yaml -Scope CurrentUser -Force

      - name: Check for configuration drifts
        id: check
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $driftsJson = ./scripts/Get-Drifts.ps1 -TenantName '${{ matrix.tenant }}' -OutputFormat json
          $drifts = $driftsJson | ConvertFrom-Json

          $tenant = '${{ matrix.tenant }}'

          if ($drifts.Count -eq 0) {
            echo "## ✅ No Drift — $tenant" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "Tenant **$tenant** configuration is aligned with desired state in \`tenants/$tenant/config/\`." >> $env:GITHUB_STEP_SUMMARY
            "drift_count=0" >> $env:GITHUB_OUTPUT
          } else {
            echo "## ⚠️ Configuration Drift — $tenant" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "**$($drifts.Count) drift(s)** found in tenant **$tenant**:" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "| Resource Type | Resource ID | Property | Expected | Actual |" >> $env:GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|---|" >> $env:GITHUB_STEP_SUMMARY
            foreach ($d in $drifts) {
              echo "| $($d.ResourceType) | $($d.ResourceId) | $($d.Property) | $($d.ExpectedValue) | $($d.ActualValue) |" >> $env:GITHUB_STEP_SUMMARY
            }
            "drift_count=$($drifts.Count)" >> $env:GITHUB_OUTPUT
          }

      - name: Create or update GitHub Issue on drift detected
        if: steps.check.outputs.drift_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const tenant     = '${{ matrix.tenant }}';
            const driftCount = '${{ steps.check.outputs.drift_count }}';
            const runUrl     = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label      = `tenant:${tenant}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: ['drift-detected', label], state: 'open'
            });

            const title = `⚠️ Drift detected in tenant: ${tenant} (${driftCount} drift(s))`;
            const body  = `## Configuration Drift Alert — \`${tenant}\`\n\n` +
              `**${driftCount} drift(s)** detected between desired state in \`tenants/${tenant}/config/\` and the live tenant.\n\n` +
              `**[View workflow run for details](${runUrl})**\n\n` +
              `### Remediation\n` +
              `1. **Re-apply config**: trigger the [Apply Config](.github/workflows/apply.yml) workflow with tenant \`${tenant}\`\n` +
              `2. **Accept the change**: update the YAML in \`tenants/${tenant}/config/\` to reflect the new desired state\n\n` +
              `_Auto-created by scheduled drift detection._`;

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['drift-detected', 'm365-config', label]
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `🔄 **Updated drift check** (${new Date().toISOString()}): **${driftCount} drift(s)** still detected in **${tenant}**. [View details](${runUrl})`
              });
            }

      - name: Close drift issue if resolved
        if: steps.check.outputs.drift_count == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const tenant = '${{ matrix.tenant }}';
            const label  = `tenant:${tenant}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: ['drift-detected', label], state: 'open'
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Drift resolved for \`${tenant}\`!** No configuration drift detected in the latest check. Closing.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed'
              });
            }

      - name: Fail on drift (if enabled)
        if: steps.check.outputs.drift_count != '0' && github.event.inputs.fail_on_drift != 'false'
        run: exit 1
