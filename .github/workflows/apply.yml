name: Apply M365 Configuration

on:
  push:
    branches:
      - main
    paths:
      - 'tenants/**/config/**'
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Tenant to apply config for (folder name under tenants/). Leave blank to apply all.'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run mode (no changes applied)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  # Determine which tenants to run against
  discover-tenants:
    name: Discover Tenants
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.list.outputs.tenants }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for git diff on push events

      - name: List tenants
        id: list
        shell: pwsh
        run: |
          $requested = '${{ github.event.inputs.tenant }}'

          # On push, detect which tenants have changed files
          if ($env:GITHUB_EVENT_NAME -eq 'push' -and -not $requested) {
            $changed = $null
            try {
              $changedFiles = git diff --name-only HEAD~1 HEAD 2>&1
              $global:LASTEXITCODE = 0     # reset — git exits non-zero if HEAD~1 missing
              $changed = @($changedFiles |
                Where-Object { $_ -match '^tenants/([^/]+)/config/' } |
                ForEach-Object { ($_ -split '/')[1] } |
                Select-Object -Unique)
            } catch { $changed = $null }
            $tenants = if ($changed.Count -gt 0) { $changed } else {
              # Fallback: run all tenants (e.g. first push or non-config change)
              Get-ChildItem tenants -Directory | Select-Object -ExpandProperty Name
            }
          } elseif ($requested) {
            $tenants = @($requested)
          } else {
            $tenants = Get-ChildItem tenants -Directory | Select-Object -ExpandProperty Name
          }

          $json = $tenants | ConvertTo-Json -Compress
          if (@($tenants).Count -eq 1) { $json = "[$json]" }
          echo "tenants=$json" >> $env:GITHUB_OUTPUT
          Write-Host "Tenants to process: $json"

  apply-config:
    name: Apply — ${{ matrix.tenant }}
    needs: discover-tenants
    runs-on: ubuntu-latest
    environment: ${{ matrix.tenant }}   # loads per-tenant GitHub Environment secrets
    strategy:
      matrix:
        tenant: ${{ fromJson(needs.discover-tenants.outputs.tenants) }}
      fail-fast: false                  # apply other tenants even if one fails

    steps:
      - uses: actions/checkout@v4

      - name: Install required PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name powershell-yaml -Scope CurrentUser -Force

      - name: Apply configuration (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          ./scripts/Apply-Config.ps1 -TenantName '${{ matrix.tenant }}' -DryRun
          Write-Host "::notice::Dry-run complete for tenant '${{ matrix.tenant }}'. No changes applied."

      - name: Apply configuration
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          ./scripts/Apply-Config.ps1 -TenantName '${{ matrix.tenant }}'
          Write-Host "::notice::Configuration applied for tenant '${{ matrix.tenant }}'."

      - name: Check for drifts post-apply
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          Start-Sleep -Seconds 30
          ./scripts/Get-Drifts.ps1 -TenantName '${{ matrix.tenant }}'
