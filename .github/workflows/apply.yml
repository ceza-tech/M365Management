name: Apply M365 Configuration

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no changes applied)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  id-token: write   # Required for OIDC auth (recommended over client secret)

jobs:
  apply-config:
    name: Apply M365 Config to Tenant
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PowerShell
        uses: actions/setup-dotnet@v4  # pwsh is pre-installed on ubuntu-latest

      - name: Install required PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name powershell-yaml -Scope CurrentUser -Force

      - name: Apply configuration (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          ./scripts/Apply-Config.ps1 -DryRun
          Write-Host "::notice::Dry-run complete. No changes were applied."

      - name: Apply configuration
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          ./scripts/Apply-Config.ps1
          Write-Host "::notice::Configuration applied successfully."

      - name: Check for drifts post-apply
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          # Give UTCM a moment to process before checking drifts
          Start-Sleep -Seconds 30
          ./scripts/Get-Drifts.ps1
