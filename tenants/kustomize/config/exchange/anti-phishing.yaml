# config/exchange/anti-phishing.yaml
# Defender for Office 365 anti-phishing policies — spoof & impersonation protection.
# Values seeded from live tenant snapshot 2026-03-12.
# Reference: https://learn.microsoft.com/en-us/graph/utcm-exchange-resources#antiphishpolicy-resource-type

resources:
  # Default system policy (MakeDefault: true)
  - resourceType: microsoft.exchange.antiphishpolicy
    properties:
      Identity: "Office365 AntiPhish Default"
      Ensure: "Present"
      MakeDefault: true
      Enabled: true

      # Spoof protection
      EnableSpoofIntelligence: true
      EnableUnauthenticatedSender: true   # Show '?' on unverified external senders
      EnableViaTag: true                  # Show 'via' tag on forwarded mails
      SpoofQuarantineTag: "DefaultFullAccessPolicy"

      # DMARC enforcement
      HonorDmarcPolicy: true
      DmarcRejectAction: "Reject"
      DmarcQuarantineAction: "Quarantine"

      # Mailbox intelligence (Defender for Office 365 Plan 1+)
      EnableMailboxIntelligence: true
      EnableMailboxIntelligenceProtection: false
      MailboxIntelligenceProtectionAction: "NoAction"
      MailboxIntelligenceQuarantineTag: "DefaultFullAccessPolicy"

      # Impersonation protection (automatic mode — managed by Microsoft)
      ImpersonationProtectionState: "Automatic"
      EnableOrganizationDomainsProtection: false
      EnableTargetedDomainsProtection: false
      EnableTargetedUserProtection: false

      # Action on spoof detection
      AuthenticationFailAction: "MoveToJmf"
      PhishThresholdLevel: 1              # 1=Standard, 2=Aggressive, 3=More, 4=Most

      # Safety tips
      EnableFirstContactSafetyTips: false
      EnableSimilarUsersSafetyTips: false
      EnableSimilarDomainsSafetyTips: false
      EnableUnusualCharactersSafetyTips: false

      # Quarantine tags
      TargetedDomainQuarantineTag: "DefaultFullAccessPolicy"
      TargetedUserQuarantineTag: "DefaultFullAccessPolicy"

      # Policy scope (empty = applies globally)
      TargetedDomainActionRecipients: []
      TargetedUserActionRecipients: []
      TargetedUsersToProtect: []
      TargetedDomainsToProtect: []
      ExcludedSenders: []
      ExcludedDomains: []
      MailboxIntelligenceProtectionActionRecipients: []

  # Custom policy "te" (non-default)
  - resourceType: microsoft.exchange.antiphishpolicy
    properties:
      Identity: "te"
      Ensure: "Present"
      MakeDefault: false
      Enabled: true
      EnableSpoofIntelligence: true
      EnableUnauthenticatedSender: true
      EnableViaTag: true
      HonorDmarcPolicy: true
      DmarcRejectAction: "Reject"
      DmarcQuarantineAction: "Quarantine"
      EnableMailboxIntelligence: true
      EnableMailboxIntelligenceProtection: false
      ImpersonationProtectionState: "Manual"
      EnableOrganizationDomainsProtection: false
      EnableTargetedDomainsProtection: false
      EnableTargetedUserProtection: false
      AuthenticationFailAction: "MoveToJmf"
      PhishThresholdLevel: 1
      SpoofQuarantineTag: "DefaultFullAccessPolicy"
      TargetedDomainQuarantineTag: "DefaultFullAccessPolicy"
      TargetedUserQuarantineTag: "DefaultFullAccessPolicy"
      MailboxIntelligenceQuarantineTag: "DefaultFullAccessPolicy"
      TargetedDomainProtectionAction: "NoAction"
      TargetedUserProtectionAction: "NoAction"
      MailboxIntelligenceProtectionAction: "NoAction"
      EnableFirstContactSafetyTips: false
      EnableSimilarUsersSafetyTips: false
      EnableSimilarDomainsSafetyTips: false
      EnableUnusualCharactersSafetyTips: false
      TargetedDomainActionRecipients: []
      TargetedUserActionRecipients: []
      TargetedUsersToProtect: []
      TargetedDomainsToProtect: []
      ExcludedSenders: []
      ExcludedDomains: []
      MailboxIntelligenceProtectionActionRecipients: []
