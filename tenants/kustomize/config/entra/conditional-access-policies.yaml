# config/entra/conditional-access-policies.yaml
# Desired state for Conditional Access Policies in Microsoft Entra.
#
# STATUS: PLACEHOLDER — your tenant currently has no CA policies (Security Defaults is enabled).
# To use this file:
#   1. Create CA policies in the Entra portal first
#   2. Run a snapshot to get their real GUIDs:
#      pwsh -Command "./scripts/Take-Snapshot.ps1 -Resources @('microsoft.entra.conditionalaccesspolicy')"
#   3. Replace the placeholder GUIDs below with the real ones
#   4. Add only properties supported by the UTCM schema (DisplayName, State, Ensure)
#
# IMPORTANT: GrantControls and Conditions are NOT supported by the UTCM monitor schema.
# The monitor enforces high-level state (enabled/disabled), not full policy body.
# Reference: https://learn.microsoft.com/en-us/graph/utcm-entra-resources#conditionalaccesspolicy-resource-type

resources:
  - resourceType: microsoft.entra.conditionalaccesspolicy
    properties:
      Id: "00000000-0000-0000-0000-000000000001"
      DisplayName: "Require MFA for All Users"
      State: enabled
      Ensure: Present

  - resourceType: microsoft.entra.conditionalaccesspolicy
    properties:
      Id: "00000000-0000-0000-0000-000000000002"
      DisplayName: "Block Legacy Authentication"
      State: enabled
      Ensure: Present
