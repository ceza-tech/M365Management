# config/entra/authentication-methods.yaml
# Desired state for Authentication Method policies.
#
# HOW TO USE:
#   Edit properties below, then push to main — GitHub Actions applies automatically.
#   Or run locally: pwsh ./scripts/Apply-Config.ps1
#
# Property names must exactly match the UTCM API schema (PascalCase as in snapshot).
# Reference: https://learn.microsoft.com/en-us/graph/utcm-entra-resources#authenticationmethodpolicy-resource-type

resources:
  - resourceType: microsoft.entra.authenticationmethodpolicy
    properties:
      Id: "authenticationMethodsPolicy"
      DisplayName: "Authentication Methods Policy"
      Ensure: "Present"
      RegistrationEnforcement:
        AuthenticationMethodsRegistrationCampaign:
          State: enabled
          SnoozeDurationInDays: 3
          ExcludeTargets: []
          IncludeTargets:
            - TargetType: group
              Id: all_users
              TargetedAuthenticationMethod: microsoftAuthenticator
